military:
  code: MLITR
  name: Military Event Category
  definition: |
    Military events encompass activities by state armed forces, paramilitary entities, and defense-related operations including exercises, deployments, operational activities, defense cooperation, and armed incidents. The category focuses on security and defense dimensions of state behavior, distinguishing from diplomatic engagement (though defense summits may be coded as Ministerial Engagement if diplomatic dimensions predominate) and economic arrangements (though arms sales and defense industry cooperation may overlap with Investment and Financing requiring hierarchical coding rules).

  subcategories:
    - code: MRITM_OPS
      name: Maritime Operations
      definition: |
        Naval vessel, coast guard, or maritime militia activities in regional waters including freedom of navigation operations, maritime patrols, vessel encounters, blockade or interception operations, and activities in contested or disputed maritime zones. Encompasses both routine operational activity with strategic signaling dimensions and confrontational encounters

      inclusion_criteria:
        - State naval, coast guard, or paramilitary maritime forces operations
        - Operations in disputed waters or near contested features
        - Freedom of navigation operations explicitly asserting maritime rights
        - Vessel encounters involving shadowing, blocking, or confrontational behavior
        - Maritime surveillance or intelligence collection operations with strategic dimensions

      exclusion_criteria:
        - Routine maritime patrols without strategic signaling or dispute dimensions
        - Commercial shipping incidents lacking state military/paramilitary involvement
        - Piracy incidents unless involving state responses or non-state armed groups with political dimensions

      boundary_cases:
        - |
          Coast guard vs. navy operations: Code all state maritime operations as Maritime Operations regardless of whether navy or coast guard executes, as distinction often reflects bureaucratic organization rather than operational substance
        - |
          Maritime militia: Code Chinese People's Armed Forces Maritime Militia operations as Maritime Operations despite civilian vessel appearance, given state coordination and strategic employment
        - |
          Multi-domain incidents: Code incidents involving both maritime and air dimensions (naval vessels + military aircraft) as Maritime Operations if maritime component predominates; as Airspace Operations if air component drives the incident

      anchoring_examples:
        - event: U.S. Freedom of Navigation Operation (FONOP)
          date: January 2023
          location: Mischief Reef
          definition: |
            U.S. Navy destroyer conducts transit within 12 nautical miles of Chinese-occupied Mischief Reef in Spratlys, explicitly challenging Chinese excessive maritime claims and asserting international law rights
          significance: High, routine but symbolically important assertion of legal positions
        - event: China Coast Guard Blocking Philippine Resupply Mission
          date: August 2023
          location: Second Thomas Shoal
          definition: |
            Chinese Coast Guard vessels employ water cannons against Philippine Coast Guard and supply boats attempting to resupply troops stationed aboard grounded BRP Sierra Madre, escalating gray-zone coercion tactics
          significance: High, intensification of coercive methods short of armed force
        - event: Chinese Maritime Militia Swarming
          date: March 2021
          location: Whitsun Reef
          definition: |
            Over 200 Chinese fishing vessels identified as maritime militia elements anchor at Whitsun Reef (Julian Felipe Reef) in Philippine EEZ, remaining despite Philippine diplomatic protests, asserting presence in disputed waters
          significance: High, large-scale gray-zone operation generating regional concerns
        - event: Indonesia-China Coast Guard Standoff
          date: January 2020
          location: Kepulauan Natuna (Natuna Islands), Indonesia EEZ
          definition: |
            Chinese Coast Guard vessels escort Chinese fishing boats operating in Indonesian EEZ near Natuna Islands, prompting Indonesian naval and air deployments and diplomatic protests, testing Indonesian sovereignty claims
          significance: High, Chinese probing of Indonesian resolve in overlapping claim areas
        - event: Vietnamese-Chinese Naval Confrontation
          date: July 2019
          location: Vanguard Bank
          definition: |
            Chinese survey vessel Haiyang Dizhi 8 and coast guard escorts operate within Vietnamese-claimed continental shelf near Vanguard Bank for months, shadowed by Vietnamese naval and coast guard vessels in tense standoff
          significance: High, prolonged confrontation over resource exploration rights

    - code: MLITR_EXS
      name: Military Exercises
      definition: |
        Bilateral or multilateral military training exercises including live-fire drills, field training exercises, naval exercises, air exercises, combined arms exercises, command post exercises, tabletop simulations, and humanitarian assistance/disaster relief (HADR) exercises. Encompasses exercise planning announcements, execution, and post-exercise assessments with strategic signaling dimensions

      inclusion_criteria:
        - Formal military exercises with multiple participating units or countries
        - Official announcements or military press releases documenting exercises
        - Exercises with strategic signaling dimensions (location, timing, participants, scenarios)
        - HADR exercises with military participation even if focused on non-combat operations

      exclusion_criteria:
        - Internal unit-level training without bilateral/multilateral dimensions or strategic signaling
        - Routine readiness training unless occurring in strategically significant contexts (e.g., training near disputed territories)
        - Civilian disaster preparedness exercises without military participation

      boundary_cases:
        - |
          Exercise scale thresholds: Code exercises regardless of scale if they involve bilateral/multilateral participation or occur in strategically significant contexts; exclude purely internal platoon/company-level training
        - |
          HADR vs. combat exercises: Code both HADR and combat exercises as Military Exercises, potentially noting exercise focus in descriptions for analytical differentiation
        - |
          Sequential exercises: Code each discrete exercise as separate event even if occurring in rapid succession as part of broader military engagement campaigns

      anchoring_examples:
        - event: Balikatan U.S.-Philippines Exercise
          date: April 2023
          location: Pilipinas (Philippines)
          definition: |
            Annual bilateral exercise involving 17,600 troops, largest iteration in decades, including coastal defense scenarios and expanded to four additional sites under EDCA, signaling alliance strengthening amid South China Sea tensions
          significance: High, demonstration of treaty alliance operational cooperation
        - event: China-Russia Joint Sea Naval Exercise
          date: October 2021
          location: Zaliv Petra Velikogo (Peter the Great Gulf), Sea of Japan, Rossiya (Russia)
          definition: |
            Chinese and Russian navies conduct joint exercise in Sea of Japan and Western Pacific including anti-submarine warfare and air defense drills, demonstrating strategic coordination amid both countries' tensions with United States
          significance: High, China-Russia military cooperation intensification
        - event: Super Garuda Shield Multilateral Exercise 
          date: August 2022
          location: Baturaja, Sumatera Selatan (South Sumatra), Indonesia
          definition: |
            Expanded exercise involving 14 nations including ASEAN members (Indonesia, Singapore), United States, Australia, Japan, conducting amphibious operations and jungle warfare training in Indonesian territory
          significance: Medium-high, multilateral military cooperation framework expansion
        - event: ASEAN Defense Ministers' Meeting Plus (ADMM-Plus) Field Training Exercise
          date: October 2023
          location: Ngayogyakarta (Yogyakarta), Indonesia
          definition: |
            Multilateral HADR exercise involving military forces from ASEAN and dialogue partner nations practicing disaster response coordination, institutional mechanism operationalization
          significance: Medium, ASEAN-led multilateral security cooperation practical implementation
        - event: India-Viet Nam PASSEX Naval Exercise
          date: December 2020
          location: South China Sea
          definition: |
            Indian Navy and Viet Nam People's Navy conducted a two-day Passage Exercise (PASSEX) in the South China Sea following India's delivery of humanitarian relief supplies to flood-affected regions of central Viet Nam. The exercise aimed to reinforce maritime interoperability and jointness between the two navies
          significance: Medium, represented growing India-Viet Nam defence cooperation against China's assertiveness in the South China Sea

    - code: DFNC_COOP
      name: Defense Cooperation
      definition: |
        Defense agreements, mutual defense treaties, access arrangements enabling foreign military presence, intelligence sharing arrangements, defense industry partnerships, military aid programs, and security assistance. Encompasses agreement negotiations, signings, renewals, implementation milestones, and significant capability transfers (though large-scale arms sales with strategic implications may overlap with Investment and Financing)

      inclusion_criteria:
        - Formal defense agreements or treaties with documented texts or official announcements
        - Base access agreements or status of forces agreements (SOFAs)
        - Defense industry cooperation including technology transfer or joint production
        - Military aid or security assistance programs with strategic dimensions
        - Intelligence sharing arrangements if publicly acknowledged

      exclusion_criteria:
        - Commercial arms sales without government-to-government dimensions (though most significant arms transfers involve state-to-state agreements)
        - Defense diplomatic exchanges without substantive cooperation commitments
        - Routine implementation of existing agreements without significant new developments

      boundary_cases:
        - |
          Arms sales: Code major arms sales (combat aircraft, naval vessels, advanced systems) as Defense Cooperation if they involve government-to-government agreements and strategic implications; code as Investment and Financing if commercial/economic dimensions predominate
        - | 
          Training programs: Code establishment of formal military training programs or education exchanges as Defense Cooperation if they represent institutional relationship elements; exclude individual personnel exchanges unless part of broader strategic initiatives
        - |
          Access vs. basing: Code both rotational access arrangements and permanent basing agreements as Defense Cooperation, noting distinction in descriptions for analytical purposes

      anchoring_examples:
        - event: Enhanced Defense Cooperation Agreement (EDCA) Expansion
          date: April 2023
          location: Maynila (Manila), Pilipinas (Philippines)
          definition: |
            Philippines grants United States access to four additional military bases (total nine sites) under EDCA framework, including locations in northern Luzon facing Taiwan and Palawan facing South China Sea, significantly expanding U.S. regional military posture
          significance: Critical, major alliance infrastructure enhancement amid China tensions
        - event: Australia-Singapore Comprehensive Strategic Partnership including Defense Cooperation
          location: Singapore, Singapore
          definition: |
            Comprehensive bilateral framework including Australian military training access to Singapore facilities, joint exercises, defense industry cooperation, and intelligence sharing (ongoing)
          significance: High, institutionalized bilateral defense partnership
        - event: India-Viet Nam Defense Cooperation Agreement
          date: September 2016
          location: Ha Noi (Hanoi), Viet Nam
          definition: |
            India and Viet Nam establish defense partnership including Indian provision of patrol vessels, defense industry cooperation, training programs, and potential access to Vietnamese port facilities (with subsequent enhancements)
          significance: High, India's Act East policy military dimension and Viet Nam's defense diversification
        - event: 12th Five Power Defence Arrangements (FPDA) Defence Ministers' Meeting
          date: May 2024
          location: Singapore, Singapore
          definition: |
            Highest decision-making forum of the FPDA, bringing together defence ministers from all five member nations. Held annually on the sidelines of the Shangri-La Dialogue, this meeting sets strategic direction and approves capability enhancements for the alliance
          significance: Critical, alliance's transition to fifth-generation warfare capabilities
        - event: Japan-Philippines Defense Equipment and Technology Transfer Agreement
          date: February 2016
          location: Maynila (Manila), Pilipinas (Philippines)
          definition: |
            Bilateral agreement enabling Japanese transfer of defense equipment and technology to Philippines, including radar systems and potential patrol vessels, expanding Japan's security cooperation beyond traditional pacifist constraints
          significance: High, Japanese security policy evolution enabling defense exports

    - code: MILTR_DPLY
      name: Military Deployment
      definition: |
        Force deployments, forward stationing, rotational presence, weapons system deployments, military infrastructure development, and basing activities. Encompasses both permanent installations and temporary deployments with strategic signaling dimensions, including deployment announcements, force arrivals/departures, infrastructure construction, and capability positioning

      inclusion_criteria:
        - Military unit deployments to foreign territories or strategic locations
        - Weapons system deployments (missile batteries, advanced aircraft, naval vessels) with strategic implications
        - Military base construction or expansion in strategic locations
        - Rotational force presence under defense agreements
        - Forward-deployed capabilities with regional reach implications

      exclusion_criteria:
        - Routine personnel rotations at established bases without force posture changes
        - Commercial port calls without military significance
        - Humanitarian assistance deployments unless accompanied by strategic messaging

      boundary_cases:
        - |
          Deployment duration: Code both temporary deployments (rotational forces, exercises transitioning to persistent presence) and permanent stationing as Military Deployment based on strategic significance rather than duration
        - |
          Infrastructure vs. forces: Code military infrastructure construction (airfields, ports, facilities on artificial islands) as Military Deployment even absent immediate force stationing if infrastructure enables future operational use
        - |
          Dual-use facilities: Code construction or enhancement of ostensibly civilian facilities (research stations, civilian airfields) as Military Deployment if credible evidence indicates military purposes or potential military use

      anchoring_examples:
        - event: Chinese Military Infrastructure Development
          location: Fiery Cross Reef
          definition: |
            China constructs military airfields, harbors, radar installations, weapons systems on artificial islands including Fiery Cross Reef, Subi Reef, Mischief Reef, transforming submerged features into military outposts (ongoing) 
          significance: Critical, fundamental alteration of South China Sea military balance through fait accompli infrastructure
        - event: U.S. Intermediate-Range Missile Deployment Discussions
          date: March 2023
          location: Maynila (Manila), Pilipinas (Philippines)
          definition: |
            Following U.S. withdrawal from INF Treaty, discussions emerge regarding potential deployment of intermediate-range missile systems to Philippines under EDCA, though no confirmed deployment as of 2024
          significance: High, signaling debate over regional missile architecture even without deployment confirmation
        - event: U.S. Littoral Combat Ship Rotational Deployment 
          location: Singapore, Singapore
          definition: |
            U.S. Navy maintains rotational presence of Littoral Combat Ships at Singapore's Changi Naval Base under bilateral framework, providing persistent U.S. naval presence in Southeast Asia (ongoing)
          significance: High, enduring U.S. forward presence enabling rapid regional response
        - event: Chinese Djibouti Base Establishment
          date: July 2017
          location: Jabuuti (Djibouti), Jabuuti (Djibouti)
          definition: |
            China establishes first overseas military base in Djibouti, demonstrating expeditionary capability and affecting regional calculations regarding potential Chinese base-seeking in Indian Ocean and Pacific regions (precedent affecting regional perceptions) 
          significance: High, though geographically outside ASEAN scope, influences regional base politics
        - event: Vietnamese Defensive Infrastructure 
          location: Spratly Islands, South China Sea
          definition: |
            Viet Nam constructs and upgrades facilities on Vietnamese-occupied Spratly features including runways, ports, radar systems, defensive positions, maintaining territorial presence and operational capabilities (ongoing)
          significance: High, competitive militarization of disputed features by multiple claimants

    - code: ARMD_INCDT
      name: Armed Incident
      definition: |
        Violent military confrontations including armed clashes, border skirmishes, firing incidents, casualties from military operations, armed insurgency/counterinsurgency operations with interstate dimensions, and violent encounters between state and non-state armed groups. Distinguished from non-violent military incidents (vessel encounters without shots fired, air intercepts without weapons employment) by use of lethal force and typically resulting in casualties

      inclusion_criteria:
        - Exchange of fire between military/paramilitary forces
        - Casualties (killed or wounded) resulting from military operations
        - Armed attacks on military installations or personnel
        - Lethal force employment even if not resulting in casualties (shots fired, weapons employed)
        - Insurgency/counterterrorism operations with cross-border dimensions or regional spillover

      exclusion_criteria:
        - Accidents resulting in military casualties without hostile action
        - Training incidents causing casualties absent adversary involvement
        - |
          Non-violent military confrontations however tense (water cannon employment, ramming without lethal intent coded as Maritime Operations)

      boundary_cases:
        - |
          Gray-zone vs. armed incidents: Distinguish based on lethal force employment—water cannon, ramming, non-lethal coercion coded as Maritime Operations or other appropriate subcategory; firearms discharge, explosive employment, or lethal force coded as Armed Incident
        - |
          Insurgency incidents: Code armed clashes between state forces and non-state armed groups as Armed Incidents if they possess interstate dimensions (cross-border operations, refugee flows, regional security implications) or occur in ASEAN member states as part of broader security environment; exclude purely internal security incidents without regional dimensions
        - |
          Terrorism vs. insurgency: Code both terrorist attacks and insurgent operations as Armed Incidents if they involve armed groups and possess strategic regional implications

      anchoring_examples:
        - event: Myanmar Military-Ethnic Armed Organization Clashes
          location: Variuos Border Regions 
          definition: |
            Tatmadaw engages in armed conflict with ethnic armed organizations including Karen National Union, Kachin Independence Army, and Arakan Army, generating cross-border refugee flows to Thailand and Bangladesh and regional humanitarian concerns (ongoing)
          significance: High, Myanmar internal conflict with substantial regional spillover affecting ASEAN security environment
        - event: Philippine Military-Abu Sayyaf Counterterrorism Operations
          location: Mindanao/Lalawigan ng Sulu (Sulu), Pilipinas (Philippines)
          definition: |
            Philippine Armed Forces conduct sustained counterterrorism operations against Abu Sayyaf Group and ISIS-affiliated militants in southern Philippines, involving armed clashes, casualties, and regional terrorism concerns (ongoing) 
          significance: Medium-high, persistent terrorism threat affecting regional security and requiring multilateral counterterrorism cooperation
        - event: Thailand-Cambodia Border Clash
          date: October, 2008
          location: Preah Vihear, Kampuchea (Cambodia)
          definition: |
            Armed clash between Thai and Cambodian military forces near disputed Preah Vihear Temple on border results in casualties both sides, prompting ASEAN mediation and International Court of Justice involvement (precedent relevant to ASEAN conflict resolution)
          significance: High, rare interstate armed conflict within ASEAN requiring regional dispute resolution mechanisms
        - event: Surabaya Family Suicide Bombings
          date: May 2018
          location: Kota Surabaya (Surabaya), Indonesia
          definition: |
            A series of coordinated suicide bombings carried out by a single terrorist cell (JAD) against three churches and a police headquarters. The attack was notable for involving entire families, including young children, as perpetrators
          significance: Medium, ASEAN counterterrorism cooperation context and domestic security stability implications
        - event: Marawi Siege
          date: May 2017
          location: Lungsod ng Marawi (Marawi), Pilipinas (Philippines) 
          definition: |
            ISIS-affiliated militants seize Marawi City prompting five-month military operation, extensive urban combat, over 1,000 casualties, and regional concerns about ISIS expansion in Southeast Asia
          significance: Critical, largest sustained urban combat in Southeast Asia in decades with regional terrorism implications

    - code: AIRSPC_OPS
      name: Airspace Operations
      definition: |
        Military aircraft operations including air defense identification zone (ADIZ) activities, intercepts, air-to-air encounters, surveillance and reconnaissance flights, bomber deployments, and activities in contested or sensitive airspace. Encompasses both routine operational activity with strategic signaling dimensions and confrontational encounters involving military aviation

      inclusion_criteria:
        - Military aircraft operations in contested or sensitive airspace
        - ADIZ incursions or activities testing air defense responses
        - Air intercepts where one country's aircraft shadows, confronts, or responds to another's
        - Strategic bomber or advanced aircraft deployments with regional signaling
        - Reconnaissance or surveillance flights with strategic intelligence dimensions

      exclusion_criteria:
        - Routine civil aviation operations even if involving state-owned airlines
        - Military transport flights without strategic signaling dimensions
        - Internal air defense training without international dimensions

      boundary_cases:
        - |
          ADIZ vs. sovereign airspace: Code all ADIZ-related activities as Airspace Operations regardless of whether they occur in internationally recognized sovereign airspace or claimed ADIZ zones, as ADIZ disputes themselves constitute strategic contestation
        - |
          Combined air-sea operations: Code incidents involving both air and maritime components based on which dimension drives the incident; if roughly equal, select based on which capability initiates contact or represents primary operational focus
        - |
          Close calls vs. routine operations: Code air encounters as Airspace Operations if they involve proximity closer than safe operating distances, if intercepts occur, or if official protests or statements follow; exclude routine operations maintaining safe distances without interaction

      anchoring_examples:
        - event: Chinese Military Aircraft Incursions Near Taiwan
          location: Taiwan Strait ADIZ
          definition: |
            People's Liberation Army Air Force conducts frequent sorties near Taiwan including crossing median line of Taiwan Strait, with regional implications for Southeast Asian security calculations regarding China's growing air power and potential conflict scenarios (ongoing)
          significance: High, demonstration of Chinese military capability affecting regional strategic environment
        - event: U.S. Strategic Bomber Flights
          location: South China Sea
          definition: |
            U.S. Air Force conducts B-52 or B-1 bomber flights over South China Sea, sometimes coordinating with regional partners, asserting rights to overflight international airspace and signaling regional security commitments (periodic)
          significance: High, U.S. power projection demonstration and alliance reassurance
        - event: Russian Military Aircraft in Asian Airspace
          location: Eastern Asian ADIZ
          definition: |
            Russian military aircraft conduct long-range flights through Asian airspace including near Japan, Korea, and potentially ASEAN airspace, prompting regional air defense responses and demonstrating reach (periodic)
          significance: Medium, Russian military presence maintenance in Asia-Pacific beyond primary European focus
        - event: Singapore-Malaysia Airspace Dispute
          date: December 2018
          location: Bandaraya Pasir Gudang (Pasir Gudang), Johor Darul Ta'zim (Johor), Malaysia Airspace
          definition: |
            Malaysia objects to Singapore's publication of instrument landing system procedures for Seletar Airport, claiming infringement on Malaysian airspace, prompting diplomatic tensions and temporary restrictions
          significance: Medium, rare bilateral dispute between normally cooperative ASEAN neighbors over technical airspace issues
        - event: Vietnamese Airspace Surveillance Operations
          location: South China Sea
          definition: |
            Vietnamese Air Force conducted surveillance flight over disputed waters, tracking Chinese construction activities on artificial islands
          significance: Medium, continued monitoring by smaller power's employment of available air capabilities