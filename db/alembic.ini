# =============================================================================
# db/alembic.ini — Alembic migration configuration
# =============================================================================
#
# Invocation via Alembic CLI (from project root):
#   alembic -c db/alembic.ini current
#   alembic -c db/alembic.ini upgrade head
#   alembic -c db/alembic.ini downgrade -1
#   alembic -c db/alembic.ini revision --autogenerate -m "add foo index"
#
# Preferred invocation via the deployment orchestrator (handles the full
# lifecycle including extensions, enum types, and triggers):
#   python -m main deploy
#   python -m main status
# =============================================================================
[alembic]

# ---------------------------------------------------------------------------
# script_location
# ---------------------------------------------------------------------------
# The directory Alembic uses as its script root. It must contain env.py and
# will contain the versions/ sub-directory for revision scripts.
# env.py resides at db/migrs/env.py.
# Generated revision scripts are stored at db/migrs/versions/.
# ---------------------------------------------------------------------------
script_location = migrs

# ---------------------------------------------------------------------------
# Revision file naming template
# ---------------------------------------------------------------------------
# %(year)d   four-digit year
# %(month).2d zero-padded month
# %(day).2d  zero-padded day
# %(hour).2d zero-padded hour   (UTC — see timezone below)
# %(minute).2d zero-padded minute
# %(rev)s    first 8 hex digits of the revision ID
# %(slug)s   truncated, sanitised description from the -m flag
# ---------------------------------------------------------------------------
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
timezone = UTC
truncate_slug_length = 40

# ---------------------------------------------------------------------------
# Version path separator
# ---------------------------------------------------------------------------
# Separator for multiple entries in version_locations.
# ---------------------------------------------------------------------------
version_path_separator = os

# ---------------------------------------------------------------------------
# Database URL
# ---------------------------------------------------------------------------
# Intentionally blank. db/migrs/env.py overrides this value at runtime:
#
#   db_url = os.getenv("ALEMBIC_DB_URL", str(settings.DB_URL))
#   config.set_main_option("sqlalchemy.url", db_url)
#
# NEVER commit credentials to this file.
# ---------------------------------------------------------------------------
sqlalchemy.url =

# ---------------------------------------------------------------------------
# Alembic version table placement
# ---------------------------------------------------------------------------
# The schema for the alembic_version table is set programmatically in
# db/migrs/env.py via:
#
#   context.configure(
#       version_table_schema = _settings.DB_SCHEMA
#       …
#   )
#
# This co-locates the version table with the application schema so that
# schema-scoped permission grants cover Alembic's own bookkeeping table.
# The default table name 'alembic_version' is retained; override here only
# if multiple Alembic projects share the same schema.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Autogenerate comparison options
# ---------------------------------------------------------------------------
# Both are useful but increase diff noise on large schemas.
# ---------------------------------------------------------------------------
compare_server_default = true
compare_type = true

# =============================================================================
# Post-write hooks
# =============================================================================
# Commands run automatically after `alembic revision --autogenerate` writes
# a new script. The black hook reformats generated files to project style.
# Requires black to be installed in the active virtual environment.
# =============================================================================
[post_write_hooks]
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -l 88 REVISION_SCRIPT_FILENAME

# =============================================================================
# Logging
# =============================================================================
# Alembic uses Python's standard logging infrastructure. The configuration
# below separates SQLAlchemy engine output (WARN in production, set to INFO
# to see all emitted SQL) from Alembic migration progress (INFO).
#
# All handlers write to stderr so that stdout remains clean for any tooling
# that captures alembic output programmatically.
# =============================================================================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

# ---------------------------------------------------------------------------
# Root logger
# WARN suppresses verbose third-party library output. Raise to DEBUG only
# when diagnosing connection or pool issues at the framework level.
# ---------------------------------------------------------------------------
[logger_root]
level = WARN
handlers = console
qualname =

# ---------------------------------------------------------------------------
# SQLAlchemy engine logger (sqlalchemy.engine)
# WARN: silent in production.
# INFO: logs every SQL statement, including parameters — useful for debugging
#       but verbose; never enable in production with sensitive data.
# ---------------------------------------------------------------------------
[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

# ---------------------------------------------------------------------------
# Alembic migration logger (alembic)
# INFO shows upgrade/downgrade step names and revision IDs — recommended for
# CI/CD pipelines so migration runs are auditable in build logs.
# ---------------------------------------------------------------------------
[logger_alembic]
level = INFO
handlers =
qualname = alembic

# ---------------------------------------------------------------------------
# Console handler
# Writes to stderr (not stdout) to keep stdout clean for scripting.
# ---------------------------------------------------------------------------
[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

# ---------------------------------------------------------------------------
# Generic formatter
# Produces compact lines such as:
#   INFO  [alembic.runtime.migration] Running upgrade  -> a1b2c3d4, add event index
# ---------------------------------------------------------------------------
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
